<div class="container">
	<div class="button-container">
		<button mat-raised-button color="warn" (click)="doRegexCheck()" style="width: 100%;">Check</button>
		<button mat-raised-button (click)="clearResult()" style="width: 100%; margin-top: 15px;">Clear</button>
	</div>
	<div class="table-container">
		<mat-form-field appearance="fill" style="width:100%;margin-top:10px;height:100%;">
			<mat-label>Regex</mat-label>
			<input matInput #sourceData [(ngModel)]="regexSource" />
		</mat-form-field>
		<mat-form-field appearance="fill" style="width:100%;margin-top:10px;height:100%;">
			<mat-label>Text</mat-label>
			<textarea matInput #textData [(ngModel)]="regexText"></textarea>
		</mat-form-field>
		<mat-form-field appearance="fill" style="width:100%;margin-top:10px;height:100%;">
			<mat-label>Result value</mat-label>
			<textarea matInput #regexValue disabled [(ngModel)]="regexResult.value"></textarea>
		</mat-form-field>
	</div>
</div>
