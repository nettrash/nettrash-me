server {
    listen 80;
    server_name nettrash.me;

    root /var/www/nettrash.me;
    index index.html;

    # Include standard MIME types (includes application/wasm)
    include /etc/nginx/mime.types;

    # Universal Links / App Links verification endpoints. Both Apple's
    # `swcd` and Google Play's intent-verifier insist on:
    #   - exact-match URL (no SPA-fallback rewrites),
    #   - `application/json` content type even though the AASA file has
    #     no extension,
    #   - 200 response with no redirects (a redirect = silent failure).
    # The `^~` prefix wins over the regex location below, so the
    # cache-static rule never gets to mangle these. Cache is disabled
    # so deploys propagate fast — both Apple and Google still cache
    # internally for hours / days, but at least the origin is honest.
    location ^~ /.well-known/ {
        types        { } default_type application/json;
        add_header   Cache-Control "no-store";
        try_files    $uri =404;
    }

    # Serve static files, fall back to index.html for SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|wasm|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # APK side-load downloads (Scan for Android, etc.). The default
    # nginx mime.types ships without an `.apk` mapping, so without this
    # the file would be served as `application/octet-stream` and some
    # browsers refuse to install it. We also force `Content-Disposition`
    # so the link triggers a "save / install" dialog instead of being
    # rendered inline, and we keep the cache short (~10 min) because
    # `scan-latest.apk` is a moving target rebuilt on every release.
    location ~* \.apk$ {
        types        { } default_type application/vnd.android.package-archive;
        add_header   Content-Disposition  attachment;
        add_header   X-Content-Type-Options nosniff;
        expires      10m;
        add_header   Cache-Control "public, max-age=600";
    }
}
